$kind: http-request
url: "{{baseUrl}}/themes"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('themes list succeeds', function () {
        pm.response.to.have.status(200);
      });
      var responseJson = pm.response.json();
      pm.expect(responseJson.length).to.be.greaterThan(0);
    language: text/javascript
order: 2000
