$kind: http-request
url: "{{baseUrl}}/seeds/{{seedId}}/tree"
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('seed tree fetch succeeds', function () {
        pm.response.to.have.status(200);
      });
      var responseJson = pm.response.json();
      pm.expect(responseJson._id).to.eql(pm.environment.get('seedId'));
      pm.expect(responseJson.reeds.length).to.be.greaterThan(0);
    language: text/javascript
order: 3000
